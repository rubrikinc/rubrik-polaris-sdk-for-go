query RubrikPolarisSDKRequest($policyTypes: [PolicyType!]!) {
    result: allSecurityPolicies(policyTypes: $policyTypes) {
        policy {
            policyId
            name
            description
            policyCategory
            policySeverity
            isEnabled
            isPredefined
            filter {
                ...FilterFields
            }
            thresholdFilter {
                ...FilterFields
            }
            createdAt
            updatedAt
        }
    }
}
