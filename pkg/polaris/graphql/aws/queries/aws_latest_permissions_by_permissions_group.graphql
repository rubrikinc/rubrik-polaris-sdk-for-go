query RubrikPolarisSDKRequest($features: [CloudAccountFeature!]!) {
    result: allAWSLatestPermissionsByPermissionsGroup(features: $features) {
        feature
        permissionsGroupPermissions {
            permissionsGroup
            version
            permissionStatements {
                actions {
                    action
                    usecase
                }
            }
        }
    }
}
