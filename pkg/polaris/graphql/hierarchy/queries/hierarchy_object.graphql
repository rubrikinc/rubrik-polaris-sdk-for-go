query RubrikPolarisSDKRequest($fid: UUID!, $workloadHierarchy: WorkloadLevelHierarchy) {
    result: hierarchyObject(fid: $fid, workloadHierarchy: $workloadHierarchy) {
        id
        name
        objectType
        slaAssignment
        ... on AwsNativeAccount {
            status
            awsFeatures: enabledFeatures {
                featureName
                status
                lastRefreshedAt
            }
        }
        ... on AzureNativeSubscription {
            azureFeatures: enabledFeatures {
                featureName
                lastRefreshedAt
                status
            }
        }
        configuredSlaDomain {
            ... on ClusterSlaDomain {
                id
                name
            }
            ... on GlobalSlaReply {
                id
                name
            }
        }
        effectiveSlaDomain {
            ... on ClusterSlaDomain {
                id
                name
            }
            ... on GlobalSlaReply {
                id
                name
            }
        }
    }
}

