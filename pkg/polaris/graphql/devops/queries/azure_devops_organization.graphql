query RubrikPolarisSDKRequest($workloadId: UUID!) {
  result: azureDevOpsOrganization(workloadId: $workloadId) {
    id
    nativeId
    tenantId
    tenantUuid
    connectionStatus
    authenticationMechanism
    clientId
    repoHostType
    devOpsOrgType
    projectCount
    repoCount
    lastRefreshTime
    name
    objectType
    backupLocation {
      id
      archivalGroupId
      name
      storageType
      cloudSpecificRegion {
        azureRegion
      }
    }
    cloudNativeExocompute {
      id
      hostName
      region {
        region {
          azureRegion
        }
      }
    }
    rubrikHostedExocompute {
      exocomputeClusterId
      region
    }
  }
}
