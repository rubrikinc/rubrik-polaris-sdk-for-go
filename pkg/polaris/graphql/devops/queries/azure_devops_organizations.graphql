query RubrikPolarisSDKRequest(
  $first:      Int,
  $after:      String,
  $queryType:  QueryType!,
  $ancestorId: String!,
  $filter:     [Filter!]!,
) {
  result: azureDevOpsOrganizations(
    first:      $first,
    after:      $after,
    queryType:  $queryType,
    ancestorId: $ancestorId,
    filter:     $filter,
  ) {
    nodes {
      id
      nativeId
      tenantId
      tenantUuid
      connectionStatus
      authenticationMechanism
      clientId
      repoHostType
      devOpsOrgType
      projectCount
      repoCount
      lastRefreshTime
      name
      objectType
      backupLocation {
        id
        archivalGroupId
        name
        storageType
        cloudSpecificRegion {
          azureRegion
        }
      }
      cloudNativeExocompute {
        id
        hostName
        region {
          region {
            azureRegion
          }
        }
      }
      rubrikHostedExocompute {
        region
      }
    }
    pageInfo {
      endCursor
      hasNextPage
    }
    count
  }
}
