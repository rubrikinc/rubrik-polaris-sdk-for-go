query RubrikPolarisSDKRequest(
  $first:      Int,
  $after:      String,
  $queryType:  QueryType!,
  $ancestorId: String!,
  $filter:     [Filter!]!,
) {
  result: azureDevOpsProjects(
    first:      $first,
    after:      $after,
    queryType:  $queryType,
    ancestorId: $ancestorId,
    filter:     $filter,
  ) {
    nodes {
      id
      nativeId
      name
      orgId
      orgName
      url
      repoCount
      objectType
    }
    pageInfo {
      endCursor
      hasNextPage
    }
    count
  }
}
