query RubrikPolarisSDKRequest($id: String!, $clusterUuid: String!) {
    result: jobInstance(input: {id: $id, clusterUuid: $clusterUuid}) {
        archived
        endTime
        errorInfo
        eventSeriesId
        id
        isDisabled
        jobProgress
        jobType
        nodeId
        result
        startTime
        status
        childJobDebugInfo
        opentracingContext
    }
}
